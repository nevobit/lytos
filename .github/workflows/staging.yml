name: Deploy STAGING to AWS ECS

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: staging

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR (sha + stg-latest)
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI_SHA="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          IMAGE_URI_LATEST="$ECR_REGISTRY/$ECR_REPOSITORY:stg-latest"

          docker build -f apps/rest/Dockerfile -t "$IMAGE_URI_SHA" -t "$IMAGE_URI_LATEST" .
          docker push "$IMAGE_URI_SHA"
          docker push "$IMAGE_URI_LATEST"

          echo "image=$IMAGE_URI_SHA" >> $GITHUB_OUTPUT
          echo "CLUSTER: ${{secrets.ECS_CLUSTER}}""
          echo "SERVICE: ${{secrets.ECS_SERVICE}}""

      - name: Render Amazon ECS task definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ secrets.ECS_TASK_DEFINITION }}
          container-name: ${{ secrets.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Who am I? (AWS account) + region
        run: |
          aws sts get-caller-identity
          aws configure list
          echo "AWS_REGION=$AWS_REGION"
          echo "AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION"

      - name: Deploy to ECS (STAGING)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: ${{ secrets.ECS_CLUSTER }}
          cluster: ${{ secrets.ECS_SERVICE }}
          wait-for-service-stability: true
